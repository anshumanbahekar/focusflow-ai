  <text x="568" y="362" text-anchor="middle" font-size="11" fill="#F5A085">Claude stream (SSE)</text>

  <rect x="678" y="318" width="182" height="58" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="769" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">/api/tasks</text>
  <text x="769" y="362" text-anchor="middle" font-size="11" fill="#F5A085">CRUD + ordering</text>

