  <rect x="130" y="400" width="196" height="58" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="228" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">/api/sessions</text>
  <text x="228" y="444" text-anchor="middle" font-size="11" fill="#F5A085">Pomodoro logging</text>

  <rect x="342" y="400" width="210" height="58" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="447" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">/api/analytics</text>
  <text x="447" y="444" text-anchor="middle" font-size="11" fill="#F5A085">Score + heatmap data</text>

  <rect x="568" y="400" width="242" height="58" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="689" y="424" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">/api/notifications</text>
  <text x="689" y="444" text-anchor="middle" font-size="11" fill="#F5A085">Web push (VAPID)</text>

