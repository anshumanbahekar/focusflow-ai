  <text x="545" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Focus session</text>
  <text x="545" y="128" text-anchor="middle" font-size="11" fill="#A89FD8">Pomodoro + timer</text>

