  <text x="358" y="362" text-anchor="middle" font-size="11" fill="#F5A085">Claude prompt chain</text>

  <rect x="472" y="318" width="192" height="58" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
