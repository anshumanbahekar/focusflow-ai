  <text x="450" y="602" text-anchor="middle" font-size="11" fill="#F5C842">Claude → LLaMA fallback</text>

  <rect x="600" y="564" width="260" height="50" rx="8" fill="#2B2208" stroke="#E8B830" stroke-width="1.5"/>
  <text x="730" y="584" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Redis (Upstash)</text>
