  <rect x="52" y="178" width="830" height="108" rx="10" fill="#16162A" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="6 4"/>
  <rect x="52" y="298" width="830" height="238" rx="10" fill="#16162A" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="6 4"/>
  <rect x="52" y="548" width="830" height="76" rx="10" fill="#16162A" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="6 4"/>

