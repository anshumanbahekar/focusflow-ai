<svg width="900" height="570" viewBox="0 0 900 570" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3DB88A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="570" fill="#0F0F1A" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">FocusFlow AI — Page Map</text>

  <!-- /auth root -->
  <rect x="320" y="56" width="260" height="60" rx="8" fill="#1E2038" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="450" y="81" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">/auth</text>
  <text x="450" y="102" text-anchor="middle" font-size="11" fill="#888888">Login / signup / OAuth (Google · GitHub · Email)</text>

  <!-- Branches -->
  <path d="M390 116 L210 174" fill="none" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M510 116 L690 174" fill="none" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="272" y="150" text-anchor="middle" font-size="11" fill="#888888">new user</text>
  <text x="626" y="150" text-anchor="middle" font-size="11" fill="#888888">returning</text>

  <!-- /onboarding -->
  <rect x="80" y="174" width="260" height="60" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="1.5"/>
  <text x="210" y="199" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">/onboarding</text>
  <text x="210" y="220" text-anchor="middle" font-size="11" fill="#7EEDC5">Goals + schedule prefs</text>

  <!-- /app shell -->
