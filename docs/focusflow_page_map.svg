  <text x="646" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#F5A085">/analytics</text>
  <text x="646" y="340" text-anchor="middle" font-size="10" fill="#C47060">Heatmap + trends</text>

  <rect x="750" y="298" width="130" height="60" rx="8" fill="#3B1F1A" stroke="#D45A30" stroke-width="1.5"/>
  <text x="815" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#F5A085">/settings</text>
  <text x="815" y="340" text-anchor="middle" font-size="10" fill="#C47060">Profile + prefs</text>

  <!-- Sub-page arrows -->
  <line x1="260" y1="358" x2="220" y2="418" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="450" y1="358" x2="450" y2="418" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="646" y1="358" x2="646" y2="418" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Sub-pages -->
  <rect x="100" y="418" width="240" height="56" rx="8" fill="#2B2208" stroke="#C9820A" stroke-width="1.5"/>
  <text x="220" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C842">/tasks/[id]</text>
  <text x="220" y="458" text-anchor="middle" font-size="11" fill="#B8960A">Subtasks + progress</text>

  <rect x="358" y="418" width="184" height="56" rx="8" fill="#2B2208" stroke="#C9820A" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C842">/focus/session</text>
  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#B8960A">Live timer + AI chat</text>

  <rect x="556" y="418" width="180" height="56" rx="8" fill="#2B2208" stroke="#C9820A" stroke-width="1.5"/>
  <text x="646" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C842">/analytics/advanced</text>
  <text x="646" y="458" text-anchor="middle" font-size="11" fill="#B8960A">Deep insights</text>

  <!-- API routes strip -->
  <rect x="28" y="494" width="844" height="42" rx="8" fill="#1A1830" stroke="#2D2B50" stroke-width="1"/>
  <text x="450" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#6B68A0" letter-spacing="0.5">API ROUTES</text>
  <text x="450" y="528" text-anchor="middle" font-size="11" fill="#5A5790">/api/ai/decompose · /api/ai/coach · /api/tasks · /api/sessions · /api/analytics · /api/notifications · /api/export</text>
</svg>
