<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5A5790" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#0F0F1A" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#E8E6FF" letter-spacing="0.5">FocusFlow AI — Page Map</text>

  <!-- /auth root -->
  <rect x="330" y="56" width="240" height="58" rx="8" fill="#1E2235" stroke="#4A4870" stroke-width="1.5"/>
  <text x="450" y="79" text-anchor="middle" font-size="14" font-weight="700" fill="#C5BFFF">/auth</text>
  <text x="450" y="98" text-anchor="middle" font-size="11" fill="#6A6A90">Login / signup / OAuth</text>

  <!-- Branches to onboarding and shell -->
  <path d="M390 114 L220 172" fill="none" stroke="#5A5790" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M510 114 L680 172" fill="none" stroke="#5A5790" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="278" y="146" text-anchor="middle" font-size="11" fill="#6A6A90">new user</text>
  <text x="620" y="146" text-anchor="middle" font-size="11" fill="#6A6A90">returning</text>

  <!-- /onboarding -->
  <rect x="100" y="172" width="240" height="58" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="1.5"/>
  <text x="220" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#7EEDC5">/onboarding</text>
  <text x="220" y="214" text-anchor="middle" font-size="11" fill="#4DB896">Goals + schedule prefs</text>

  <!-- /app shell -->
  <rect x="560" y="172" width="240" height="58" rx="8" fill="#2D1F6E" stroke="#7B6FD4" stroke-width="1.5"/>
