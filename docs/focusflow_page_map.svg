  <text x="690" y="220" text-anchor="middle" font-size="11" fill="#A89FD8">Sidebar + global nav</text>

  <!-- onboarding → shell -->
  <path d="M340 204 L560 204" fill="none" stroke="#3DB88A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Shell → 5 main pages -->
  <path d="M618 234 L86 294" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M645 234 L230 294" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M672 234 L450 294" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M710 234 L660 294" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M740 234 L820 294" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 5 main pages -->
  <rect x="28" y="294" width="116" height="64" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="86" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/dashboard</text>
  <text x="86" y="342" text-anchor="middle" font-size="10" fill="#F5A085">Score + today</text>

  <rect x="158" y="294" width="144" height="64" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
