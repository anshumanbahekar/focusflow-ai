  <text x="230" y="342" text-anchor="middle" font-size="10" fill="#F5A085">AI decomposer</text>

  <rect x="368" y="294" width="164" height="64" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/focus</text>
  <text x="450" y="342" text-anchor="middle" font-size="10" fill="#F5A085">Pomodoro + AI coach</text>

  <rect x="588" y="294" width="144" height="64" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="660" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/analytics</text>
  <text x="660" y="342" text-anchor="middle" font-size="10" fill="#F5A085">Heatmap + trends</text>

  <rect x="754" y="294" width="118" height="64" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="813" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/settings</text>
  <text x="813" y="342" text-anchor="middle" font-size="10" fill="#F5A085">Profile + prefs</text>

  <!-- Sub-page arrows (white) -->
  <line x1="230" y1="358" x2="200" y2="418" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="450" y1="358" x2="450" y2="418" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="660" y1="358" x2="660" y2="418" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Sub-pages -->
  <rect x="90" y="418" width="220" height="56" rx="8" fill="#2B2208" stroke="#E8B830" stroke-width="1.5"/>
  <text x="200" y="441" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/tasks/[id]</text>
  <text x="200" y="460" text-anchor="middle" font-size="11" fill="#F5C842">Subtasks + progress</text>

  <rect x="358" y="418" width="184" height="56" rx="8" fill="#2B2208" stroke="#E8B830" stroke-width="1.5"/>
  <text x="450" y="441" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/focus/session</text>
  <text x="450" y="460" text-anchor="middle" font-size="11" fill="#F5C842">Live timer + AI chat</text>

  <rect x="568" y="418" width="184" height="56" rx="8" fill="#2B2208" stroke="#E8B830" stroke-width="1.5"/>
  <text x="660" y="441" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">/analytics/advanced</text>
  <text x="660" y="460" text-anchor="middle" font-size="11" fill="#F5C842">Deep insights view</text>

  <!-- API strip -->
  <rect x="28" y="494" width="844" height="58" rx="8" fill="#16162A" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="5 4"/>
  <text x="450" y="514" text-anchor="middle" font-size="10" font-weight="700" fill="#888888" letter-spacing="1.5">API ROUTES</text>
  <text x="450" y="534" text-anchor="middle" font-size="11" fill="#5A5790">/api/ai/decompose · /api/ai/coach · /api/tasks · /api/sessions · /api/analytics · /api/notifications · /api/export</text>
</svg>
