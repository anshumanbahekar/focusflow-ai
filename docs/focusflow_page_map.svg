  <text x="680" y="214" text-anchor="middle" font-size="11" fill="#8A84C4">Sidebar + global nav</text>

  <!-- onboarding → shell -->
  <path d="M340 201 L560 201" fill="none" stroke="#3DB88A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Shell → 5 main pages -->
  <path d="M624 230 L100 298" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M644 230 L260 298" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M670 230 L450 298" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M700 230 L650 298" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M730 230 L820 298" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 5 main pages -->
  <rect x="28" y="298" width="144" height="60" rx="8" fill="#3B1F1A" stroke="#D45A30" stroke-width="1.5"/>
  <text x="100" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#F5A085">/dashboard</text>
  <text x="100" y="340" text-anchor="middle" font-size="10" fill="#C47060">Score + today's plan</text>

  <rect x="186" y="298" width="148" height="60" rx="8" fill="#3B1F1A" stroke="#D45A30" stroke-width="1.5"/>
  <text x="260" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#F5A085">/tasks</text>
  <text x="260" y="340" text-anchor="middle" font-size="10" fill="#C47060">AI decomposer view</text>

  <rect x="358" y="298" width="184" height="60" rx="8" fill="#3B1F1A" stroke="#D45A30" stroke-width="1.5"/>
  <text x="450" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#F5A085">/focus</text>
  <text x="450" y="340" text-anchor="middle" font-size="10" fill="#C47060">Pomodoro + AI coach</text>

