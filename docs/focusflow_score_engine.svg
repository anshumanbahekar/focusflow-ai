<svg width="900" height="630" viewBox="0 0 900 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3DB88A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="630" fill="#0F0F1A" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">FocusFlow AI — Focus Score Engine</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="540" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="6 4"/>

  <!-- Column headers -->
  <text x="215" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#9B8FE8" letter-spacing="1">SCORE FORMULA</text>
  <text x="675" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#3DB88A" letter-spacing="1">SESSION STATE MACHINE</text>

  <!-- LEFT: 5 signal inputs -->
  <rect x="40" y="80" width="240" height="56" rx="8" fill="#2D1F6E" stroke="#9B8FE8" stroke-width="1.5"/>
  <text x="160" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Completion ratio</text>
  <text x="160" y="122" text-anchor="middle" font-size="11" fill="#A89FD8">Sessions done / planned</text>
  <text x="316" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#E8B830">×0.35</text>

  <rect x="40" y="154" width="240" height="56" rx="8" fill="#2D1F6E" stroke="#9B8FE8" stroke-width="1.5"/>
  <text x="160" y="177" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Task closure rate</text>
  <text x="160" y="196" text-anchor="middle" font-size="11" fill="#A89FD8">Tasks closed per day</text>
  <text x="316" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#E8B830">×0.25</text>

  <rect x="40" y="228" width="240" height="56" rx="8" fill="#2D1F6E" stroke="#9B8FE8" stroke-width="1.5"/>
  <text x="160" y="251" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Focus duration</text>
  <text x="160" y="270" text-anchor="middle" font-size="11" fill="#A89FD8">Actual vs estimated time</text>
  <text x="316" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#E8B830">×0.20</text>

  <rect x="40" y="302" width="240" height="56" rx="8" fill="#2D1F6E" stroke="#9B8FE8" stroke-width="1.5"/>
  <text x="160" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Streak multiplier</text>
  <text x="160" y="344" text-anchor="middle" font-size="11" fill="#A89FD8">Consecutive active days</text>
  <text x="316" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#E8B830">×0.12</text>

  <rect x="40" y="376" width="240" height="56" rx="8" fill="#2D1F6E" stroke="#9B8FE8" stroke-width="1.5"/>
  <text x="160" y="399" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Break compliance</text>
  <text x="160" y="418" text-anchor="middle" font-size="11" fill="#A89FD8">Breaks taken on schedule</text>
  <text x="316" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#E8B830">×0.08</text>

  <!-- Lines from signals → weighted avg node -->
  <path d="M280 108 Q370 108 370 466" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M280 182 Q366 182 366 466" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M280 256 Q362 256 362 466" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M280 330 Q358 350 358 466" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M280 404 Q354 430 354 466" fill="none" stroke="#FFFFFF" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Weighted avg node -->
  <rect x="350" y="466" width="100" height="60" rx="8" fill="#2B2208" stroke="#E8B830" stroke-width="2"/>
  <text x="400" y="487" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Weighted</text>
  <text x="400" y="502" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">avg</text>
  <text x="400" y="519" text-anchor="middle" font-size="10" fill="#E8B830">0 – 100</text>

  <!-- Weighted avg → daily score -->
  <line x1="400" y1="526" x2="400" y2="546" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="270" y="546" width="260" height="50" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="2"/>
  <text x="400" y="567" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Daily focus score (0–100)</text>
  <text x="400" y="585" text-anchor="middle" font-size="10" fill="#7EEDC5">Stored in daily_scores table</text>

  <!-- Score → dashboard / chart outputs -->
  <path d="M320 596 L160 612" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <path d="M480 596 L630 612" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <rect x="60" y="610" width="200" height="14" rx="4" fill="none"/>
  <text x="160" y="622" text-anchor="middle" font-size="11" fill="#888888">Dashboard ring</text>
  <text x="630" y="622" text-anchor="middle" font-size="11" fill="#888888">Weekly trend chart</text>

  <!-- RIGHT: state machine -->
  <!-- IDLE -->
  <rect x="570" y="80" width="284" height="56" rx="8" fill="#1E2038" stroke="#FFFFFF" stroke-width="0.8"/>
  <text x="712" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">IDLE</text>
  <text x="712" y="122" text-anchor="middle" font-size="11" fill="#888888">No active session</text>
  <line x1="712" y1="136" x2="712" y2="154" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="728" y="148" font-size="10" fill="#888888">start</text>

  <!-- FOCUSING -->
  <rect x="570" y="154" width="284" height="56" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="2"/>
  <text x="712" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">FOCUSING</text>
  <text x="712" y="196" text-anchor="middle" font-size="11" fill="#7EEDC5">Timer running · coach active</text>
  <line x1="712" y1="210" x2="712" y2="228" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="728" y="222" font-size="10" fill="#888888">timer end</text>

  <!-- Resume dashed: PAUSED → FOCUSING -->
  <path d="M570 325 Q540 325 540 182 Q540 182 570 182" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="527" y="260" text-anchor="middle" font-size="10" fill="#FFFFFF" transform="rotate(-90,527,260)">resume</text>

  <!-- BREAK -->
  <rect x="570" y="228" width="284" height="56" rx="8" fill="#2B2208" stroke="#E8B830" stroke-width="1.5"/>
  <text x="712" y="251" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">BREAK</text>
  <text x="712" y="270" text-anchor="middle" font-size="11" fill="#F5C842">Short or long break mode</text>
  <line x1="712" y1="284" x2="712" y2="302" stroke="#FFFFFF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="728" y="296" font-size="10" fill="#888888">break end</text>

  <!-- PAUSED -->
  <rect x="570" y="302" width="284" height="56" rx="8" fill="#3B1F1A" stroke="#E8724A" stroke-width="1.5"/>
  <text x="712" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">PAUSED</text>
  <text x="712" y="344" text-anchor="middle" font-size="11" fill="#F5A085">User interrupted session</text>
  <line x1="712" y1="358" x2="712" y2="376" stroke="#FF6B6B" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="728" y="370" font-size="10" fill="#FF6B6B">give up</text>

  <!-- ABANDONED -->
  <rect x="570" y="376" width="284" height="56" rx="8" fill="#2A0A0A" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="712" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">ABANDONED</text>
  <text x="712" y="418" text-anchor="middle" font-size="11" fill="#FF8080">Penalises score slightly</text>
  <line x1="712" y1="432" x2="712" y2="450" stroke="#3DB88A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- COMPLETED -->
  <rect x="570" y="450" width="284" height="56" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="2"/>
  <text x="712" y="473" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">COMPLETED</text>
  <text x="712" y="492" text-anchor="middle" font-size="11" fill="#7EEDC5">Score update + XP grant</text>
  <line x1="712" y1="506" x2="712" y2="524" stroke="#3DB88A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Summary -->
  <rect x="570" y="524" width="284" height="50" rx="8" fill="#1E2038" stroke="#FFFFFF" stroke-width="0.8"/>
  <text x="712" y="545" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Summary modal</text>
  <text x="712" y="563" text-anchor="middle" font-size="11" fill="#888888">Score delta + next task</text>

  <!-- Loop: COMPLETED → FOCUSING (right side) -->
  <path d="M854 470 Q878 470 878 182 Q878 182 854 182" fill="none" stroke="#3DB88A" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-green)"/>
  <text x="892" y="330" text-anchor="middle" font-size="10" fill="#3DB88A" transform="rotate(90,892,330)">next session</text>
</svg>
