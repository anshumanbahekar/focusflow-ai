<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5A5790" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3DB88A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#0F0F1A" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#E8E6FF" letter-spacing="0.5">FocusFlow AI — Focus Score Engine</text>

  <!-- Divider -->
  <line x1="450" y1="56" x2="450" y2="530" stroke="#2D2B50" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- Column headers -->
  <text x="210" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#7B6FD4" letter-spacing="0.5">SCORE FORMULA</text>
  <text x="680" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#3DB88A" letter-spacing="0.5">SESSION STATE MACHINE</text>

  <!-- LEFT: 5 input signals -->
  <rect x="52" y="82" width="230" height="54" rx="8" fill="#2D1F6E" stroke="#7B6FD4" stroke-width="1.5"/>
  <text x="167" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#C5BFFF">Completion ratio</text>
  <text x="167" y="122" text-anchor="middle" font-size="11" fill="#8A84C4">Sessions done / planned</text>
  <text x="300" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#C9820A">×0.35</text>

  <rect x="52" y="154" width="230" height="54" rx="8" fill="#2D1F6E" stroke="#7B6FD4" stroke-width="1.5"/>
  <text x="167" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#C5BFFF">Task closure rate</text>
  <text x="167" y="194" text-anchor="middle" font-size="11" fill="#8A84C4">Tasks closed per day</text>
  <text x="300" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#C9820A">×0.25</text>

  <rect x="52" y="226" width="230" height="54" rx="8" fill="#2D1F6E" stroke="#7B6FD4" stroke-width="1.5"/>
  <text x="167" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#C5BFFF">Focus duration</text>
  <text x="167" y="266" text-anchor="middle" font-size="11" fill="#8A84C4">Actual vs estimated time</text>
  <text x="300" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#C9820A">×0.20</text>

  <rect x="52" y="298" width="230" height="54" rx="8" fill="#2D1F6E" stroke="#7B6FD4" stroke-width="1.5"/>
  <text x="167" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#C5BFFF">Streak multiplier</text>
  <text x="167" y="338" text-anchor="middle" font-size="11" fill="#8A84C4">Consecutive active days</text>
  <text x="300" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#C9820A">×0.12</text>

  <rect x="52" y="370" width="230" height="54" rx="8" fill="#2D1F6E" stroke="#7B6FD4" stroke-width="1.5"/>
  <text x="167" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#C5BFFF">Break compliance</text>
  <text x="167" y="410" text-anchor="middle" font-size="11" fill="#8A84C4">Breaks taken on schedule</text>
  <text x="300" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#C9820A">×0.08</text>

  <!-- Arrows from signals to weighted avg -->
  <path d="M282 109 Q340 109 340 450 Q340 460 348 460" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M282 181 Q336 181 336 450 Q336 460 348 460" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M282 253 Q332 253 332 460 Q332 460 348 460" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M282 325 Q328 325 328 460 Q328 460 348 460" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M282 397 Q324 440 348 460" fill="none" stroke="#5A5790" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Weighted avg node -->
  <rect x="348" y="432" width="90" height="56" rx="8" fill="#2B2208" stroke="#C9820A" stroke-width="2"/>
  <text x="393" y="452" text-anchor="middle" font-size="11" font-weight="600" fill="#F5C842">Weighted</text>
  <text x="393" y="467" text-anchor="middle" font-size="11" font-weight="600" fill="#F5C842">avg</text>
  <text x="393" y="482" text-anchor="middle" font-size="10" fill="#B8960A">0–100</text>

  <!-- Weighted avg → daily score -->
  <line x1="393" y1="488" x2="393" y2="508" stroke="#C9820A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="280" y="508" width="220" height="48" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="2"/>
  <text x="390" y="528" text-anchor="middle" font-size="13" font-weight="600" fill="#7EEDC5">Daily focus score (0–100)</text>
  <text x="390" y="546" text-anchor="middle" font-size="10" fill="#4DB896">Stored in daily_scores table</text>

  <!-- Score → UI outputs -->
  <path d="M310 556 L160 580" fill="none" stroke="#3DB88A" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-green)"/>
  <path d="M470 556 L620 580" fill="none" stroke="#3DB88A" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-green)"/>
  <rect x="72" y="578" width="172" height="32" rx="6" fill="#1E2235" stroke="#4A4870" stroke-width="1"/>
  <text x="158" y="598" text-anchor="middle" font-size="11" fill="#8A84C4">Dashboard ring</text>
  <rect x="534" y="578" width="172" height="32" rx="6" fill="#1E2235" stroke="#4A4870" stroke-width="1"/>
  <text x="620" y="598" text-anchor="middle" font-size="11" fill="#8A84C4">Weekly trend chart</text>

  <!-- RIGHT: state machine -->
  <!-- IDLE -->
  <rect x="580" y="82" width="200" height="54" rx="8" fill="#1E2235" stroke="#4A4870" stroke-width="1"/>
  <text x="680" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#A0A0C8">IDLE</text>
  <text x="680" y="122" text-anchor="middle" font-size="11" fill="#6A6A90">No active session</text>
  <line x1="680" y1="136" x2="680" y2="154" stroke="#5A5790" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="696" y="148" font-size="10" fill="#6A6A90">start</text>

  <!-- FOCUSING -->
  <rect x="580" y="154" width="200" height="54" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="2"/>
  <text x="680" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#7EEDC5">FOCUSING</text>
  <text x="680" y="194" text-anchor="middle" font-size="11" fill="#4DB896">Timer running · coach active</text>
  <line x1="680" y1="208" x2="680" y2="226" stroke="#5A5790" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="696" y="220" font-size="10" fill="#6A6A90">timer end</text>

  <!-- Pause arrow left of FOCUSING -->
  <path d="M580 181 Q540 181 540 290 Q540 325 580 325" fill="none" stroke="#8B1A1A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="524" y="256" text-anchor="middle" font-size="10" fill="#C05050" transform="rotate(-90,524,256)">resume</text>

  <!-- BREAK -->
  <rect x="580" y="226" width="200" height="54" rx="8" fill="#2B2208" stroke="#C9820A" stroke-width="1.5"/>
  <text x="680" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C842">BREAK</text>
  <text x="680" y="266" text-anchor="middle" font-size="11" fill="#B8960A">Short or long break mode</text>
  <line x1="680" y1="280" x2="680" y2="298" stroke="#5A5790" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="696" y="292" font-size="10" fill="#6A6A90">break end</text>

  <!-- PAUSED -->
  <rect x="580" y="298" width="200" height="54" rx="8" fill="#3B1F1A" stroke="#D45A30" stroke-width="1.5"/>
  <text x="680" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#F5A085">PAUSED</text>
  <text x="680" y="338" text-anchor="middle" font-size="11" fill="#C47060">User interrupted session</text>
  <line x1="680" y1="352" x2="680" y2="370" stroke="#8B1A1A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="696" y="364" font-size="10" fill="#C05050">give up</text>

  <!-- ABANDONED -->
  <rect x="580" y="370" width="200" height="54" rx="8" fill="#2A0A0A" stroke="#8B1A1A" stroke-width="1.5"/>
  <text x="680" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#FF8080">ABANDONED</text>
  <text x="680" y="410" text-anchor="middle" font-size="11" fill="#C05050">Penalises score slightly</text>
  <line x1="680" y1="424" x2="680" y2="442" stroke="#3DB88A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- COMPLETED -->
  <rect x="580" y="442" width="200" height="54" rx="8" fill="#1A3830" stroke="#3DB88A" stroke-width="2"/>
  <text x="680" y="464" text-anchor="middle" font-size="13" font-weight="600" fill="#7EEDC5">COMPLETED</text>
  <text x="680" y="482" text-anchor="middle" font-size="11" fill="#4DB896">Score update + XP grant</text>
  <line x1="680" y1="496" x2="680" y2="514" stroke="#3DB88A" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Summary modal -->
  <rect x="580" y="514" width="200" height="48" rx="8" fill="#1E2235" stroke="#4A4870" stroke-width="1"/>
  <text x="680" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#A0A0C8">Summary modal</text>
  <text x="680" y="552" text-anchor="middle" font-size="11" fill="#6A6A90">Score delta + next task</text>

  <!-- Next session loop (right side) -->
  <path d="M780 467 Q840 467 840 181 Q840 181 780 181" fill="none" stroke="#3DB88A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>
  <text x="856" y="330" text-anchor="start" font-size="10" fill="#3DB88A" transform="rotate(90,856,330)">next session</text>
</svg>
